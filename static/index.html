<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OCR Text Extractor</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 60px auto;
    padding: 0 20px;
    color: #222;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; }

  #drop-area {
    border: 2px dashed #aaa;
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    color: #555;
    background: #fafafa;
  }
  #drop-area.hover {
    border-color: #4a90e2;
    background: #eef5ff;
  }

  #preview {
    display: none;
    max-width: 100%;
    margin-top: 16px;
    border-radius: 8px;
  }

  button {
    margin-top: 16px;
    padding: 10px 20px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }

  #status { margin-top: 10px; color: #666; }

  #result {
    white-space: pre-wrap;
    background: #f5f5f5;
    border-radius: 8px;
    padding: 16px;
    margin-top: 16px;
    min-height: 40px;
  }
</style>
</head>
<body>

<h1>📄 OCR Text Extractor</h1>
<p class="sub">Upload an image and extract the text from it.</p>

<div id="drop-area">
  Click to choose an image or PDF, or drag & drop here
  <input type="file" id="file-input" accept="image/*,application/pdf" hidden />
</div>

<img id="preview" alt="preview" />

<button id="extract-btn" disabled>Extract Text</button>
<button id="download-btn" disabled>Download as Word</button>

<div id="status"></div>
<div id="result"></div>

<script>
  const dropArea = document.getElementById('drop-area');
  const fileInput = document.getElementById('file-input');
  const preview = document.getElementById('preview');
  const extractBtn = document.getElementById('extract-btn');
  const downloadBtn = document.getElementById('download-btn');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');

  let selectedFile = null;

  dropArea.addEventListener('click', () => fileInput.click());

  dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('hover');
  });

  dropArea.addEventListener('dragleave', () => {
    dropArea.classList.remove('hover');
  });

  dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('hover');
    if (e.dataTransfer.files.length) {
      setFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) {
      setFile(e.target.files[0]);
    }
  });

  function setFile(file) {
    selectedFile = file;

    if (file.type === 'application/pdf') {
      preview.style.display = 'none';
      statusEl.textContent = `Selected PDF: ${file.name}`;
    } else {
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      statusEl.textContent = '';
    }

    extractBtn.disabled = false;
    downloadBtn.disabled = true;
    resultEl.textContent = '';
  }

  extractBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    extractBtn.disabled = true;
    statusEl.textContent = 'Extracting text... please wait.';
    resultEl.textContent = '';

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/ocr', {
        method: 'POST',
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        statusEl.textContent = 'Error: ' + (data.detail || res.statusText);
        downloadBtn.disabled = true;
      } else {
        const pageInfo = data.num_pages > 1 ? ` (${data.num_pages} pages)` : '';
        statusEl.textContent = 'Done.' + pageInfo;
        resultEl.textContent = data.text || '(no text found)';
        downloadBtn.disabled = false;
      }
    } catch (err) {
      statusEl.textContent = 'Request failed: ' + err;
    } finally {
      extractBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', async () => {
    downloadBtn.disabled = true;
    statusEl.textContent = 'Generating Word file... please wait.';

    try {
      const res = await fetch('/download');

      if (!res.ok) {
        const data = await res.json();
        statusEl.textContent = 'Error: ' + (data.detail || res.statusText);
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = selectedFile.name.replace(/\.[^/.]+$/, '') + '_extracted.docx';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      statusEl.textContent = 'Word file downloaded.';
    } catch (err) {
      statusEl.textContent = 'Request failed: ' + err;
    } finally {
      downloadBtn.disabled = false;
    }
  });
</script>

</body>
</html>
